<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — Market Briefing Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #c9d1d9;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --red:       #f85149;
      --yellow:    #d29922;
      --radius:    8px;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; color: var(--accent); }
    header span { font-size: 0.85rem; color: var(--muted); }
    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      background: rgba(88,166,255,0.15);
      color: var(--accent);
      border: 1px solid rgba(88,166,255,0.3);
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - 57px);
    }

    /* Sidebar */
    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 0;
    }
    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 4px 16px 12px;
    }
    .run-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .run-item:hover { background: rgba(255,255,255,0.04); }
    .run-item.active {
      background: rgba(88,166,255,0.08);
      border-left-color: var(--accent);
    }
    .run-date {
      font-size: 0.88rem;
      font-weight: 600;
      font-family: var(--font-mono);
    }
    .run-preview {
      font-size: 0.75rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .run-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.success { background: var(--green); }
    .status-dot.demo    { background: var(--yellow); }
    .status-dot.error   { background: var(--red); }

    /* Main content */
    .main {
      overflow-y: auto;
      padding: 32px 40px;
      max-width: 900px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60%;
      gap: 12px;
      color: var(--muted);
      text-align: center;
    }
    .empty-state .icon { font-size: 3rem; }
    .empty-state h2 { font-size: 1.1rem; font-weight: 500; color: var(--text); }
    .empty-state p { font-size: 0.875rem; line-height: 1.6; max-width: 400px; }
    .empty-state code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--accent);
    }

    /* Markdown rendering */
    .report-body h1 {
      font-size: 1.5rem;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 20px;
      color: var(--text);
    }
    .report-body h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 28px 0 12px;
      color: var(--accent);
    }
    .report-body p {
      line-height: 1.7;
      margin-bottom: 12px;
      color: var(--text);
    }
    .report-body ul {
      padding-left: 20px;
      margin-bottom: 12px;
    }
    .report-body li {
      line-height: 1.7;
      margin-bottom: 4px;
      color: var(--text);
    }
    .report-body a { color: var(--accent); text-decoration: none; }
    .report-body a:hover { text-decoration: underline; }
    .report-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    .report-body th {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .report-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      color: var(--text);
    }
    .report-body tr:hover td { background: rgba(255,255,255,0.03); }
    .report-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }
    .report-body em { color: var(--muted); }
    .report-body strong { color: var(--text); font-weight: 600; }
    .report-body code {
      font-family: var(--font-mono);
      background: var(--surface);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.85em;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      padding: 40px 0;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-log-banner {
      background: rgba(210, 153, 34, 0.1);
      border: 1px solid rgba(210, 153, 34, 0.3);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin: 20px 0;
      font-size: 0.875rem;
      line-height: 1.6;
    }
    .no-log-banner code {
      font-family: var(--font-mono);
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 3px;
    }

    .refresh-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.1s;
      margin-left: auto;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.4rem">📊</span>
  <h1>Pulse</h1>
  <span>Daily AI Market Briefing Dashboard</span>
  <div class="badge">OpenClaw Cron Demo</div>
  <button class="refresh-btn" onclick="loadLog()">↻ Refresh</button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">Run History</div>
    <div id="run-list">
      <div style="padding:16px;color:var(--muted);font-size:0.8rem;">Loading…</div>
    </div>
  </aside>

  <main class="main" id="main-content">
    <div class="empty-state">
      <div class="icon">📈</div>
      <h2>Select a run from the sidebar</h2>
      <p>
        Each entry represents one pipeline execution. Run the pipeline to generate your first briefing:
      </p>
      <p><code>python3 pipeline.py --demo</code></p>
    </div>
  </main>
</div>

<script>
  const LOG_PATH    = '../run_log.json';
  const REPORT_DIR  = '../reports/';
  let   runLog      = [];

  async function loadLog() {
    const list = document.getElementById('run-list');
    list.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:0.8rem;">Loading…</div>';

    try {
      const resp = await fetch(LOG_PATH + '?t=' + Date.now());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      runLog = await resp.json();
    } catch (e) {
      runLog = [];
      list.innerHTML = `
        <div style="padding:16px;">
          <div class="no-log-banner">
            <strong>No run log found.</strong><br>
            Run the pipeline first:<br>
            <code>python3 pipeline.py --demo</code><br><br>
            Then serve this dashboard:<br>
            <code>cd 2026-03-04-cron-market-briefing && python3 -m http.server 8080</code>
          </div>
        </div>`;
      return;
    }

    if (runLog.length === 0) {
      list.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:0.8rem;">No runs yet.</div>';
      return;
    }

    // Render newest first
    const sorted = [...runLog].reverse();
    list.innerHTML = sorted.map((run, i) => {
      const statusClass = run.status === 'success' ? 'success'
                        : run.status === 'demo'    ? 'demo' : 'error';
      const label       = run.demo ? '(demo)' : '';
      const tsShort     = run.timestamp ? run.timestamp.substring(11, 16) + ' UTC' : '';
      return `
        <div class="run-item" data-idx="${runLog.length - 1 - i}" onclick="selectRun(${runLog.length - 1 - i}, this)">
          <div class="run-date">${run.date} ${label}</div>
          <div class="run-meta">
            <span class="status-dot ${statusClass}"></span>
            <span style="color:var(--muted);font-size:0.7rem">${run.status} · ${tsShort}</span>
          </div>
          <div class="run-preview">${escapeHtml(run.briefing_preview || '')}</div>
        </div>`;
    }).join('');
  }

  async function selectRun(idx, el) {
    document.querySelectorAll('.run-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');

    const run  = runLog[idx];
    const main = document.getElementById('main-content');
    main.innerHTML = '<div class="loading"><div class="spinner"></div>Loading report…</div>';

    const filename = run.report; // just the filename, e.g. "2026-03-04-demo.md"
    try {
      const resp = await fetch(REPORT_DIR + filename + '?t=' + Date.now());
      if (!resp.ok) throw new Error(`Report file not found (${resp.status})`);
      const md   = await resp.text();
      const html = marked.parse(md);
      main.innerHTML = `<div class="report-body">${html}</div>`;
    } catch (e) {
      // Fallback: render from preview in log
      main.innerHTML = `
        <div class="report-body">
          <h1>📊 Market Briefing — ${escapeHtml(run.date)}</h1>
          <h2>AI Synthesis</h2>
          <p>${escapeHtml(run.briefing_preview || 'No preview available.')}</p>
          <hr>
          <p style="color:var(--red);font-size:0.8rem">
            ⚠️ Could not load full report: ${escapeHtml(e.message)}<br>
            Make sure to serve from the project root: 
            <code>python3 -m http.server 8080</code>
          </p>
        </div>`;
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Initial load
  loadLog();
</script>
</body>
</html>
